services:
  - type: web
    name: lungdenoise-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./lungdenoise.db
      - key: ALLOWED_ORIGINS
        value: '["https://lungdenoise.vercel.app","http://localhost:3000"]'
      - key: DEBUG
        value: "false"
    disk:
      name: storage
      mountPath: /app/uploads
      sizeGB: 1
